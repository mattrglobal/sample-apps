version: '3.8'

services:
  app:
    platform: linux/arm64
    build: 
      context: .
      args:
        PORT: ${PORT:-7310}
    ports:
      - "${PORT:-7310}:${PORT:-7310}"
    env_file: .env
    environment:
      - PORT=${PORT:-7310}
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
